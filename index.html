<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ベトナム生活カウンター</title>
  <style>
    body {
      font-family: system-ui, -apple-system, "Noto Sans JP", sans-serif;
      display: grid;
      place-items: center;
      min-height: 100vh;
      margin: 0;
    }
    .day {
      font-size: 36px;
      font-weight: bold;
    }
    .small {
      margin-top: 8px;
      color: #666;
    }
  </style>
</head>
<body>

  <!-- 表示はこの2行だけ -->
  <div id="result" class="day">計算中…</div>
  <div id="today" class="small"></div>

  <script>
    // Safariでも安全な開始日指定
    // 月は0始まり → 3月 = 2
    const start = new Date(2026, 2, 3);

    function toUtcDateOnly(d) {
      return Date.UTC(d.getFullYear(), d.getMonth(), d.getDate());
    }

    const now = new Date();

    const diffDays =
      Math.floor(
        (toUtcDateOnly(now) - toUtcDateOnly(start)) /
        (1000 * 60 * 60 * 24)
      ) + 1;

    document.getElementById("result").textContent =
      `ベトナム生活 ${diffDays}日目！`;

    document.getElementById("today").textContent =
      `今日：${now.toLocaleDateString("ja-JP")}`;
  </script>

</body>
</html>
