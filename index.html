<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ベトナム生活カウンター</title>
  <style>
    body {
      font-family: system-ui, -apple-system, "Segoe UI", "Noto Sans JP", sans-serif;
      display: grid;
      place-items: center;
      min-height: 100vh;
      margin: 0;
      background: #f7f7f7;
    }
    .card {
      background: #fff;
      padding: 24px 20px;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(0,0,0,.08);
      text-align: center;
      width: min(90%, 420px);
    }
    h1 { margin: 0 0 12px; }
    .day {
      font-size: 36px;
      font-weight: 800;
      margin: 12px 0;
    }
    .small {
      font-size: 13px;
      color: #666;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>ベトナムカウンター@藤井製作所</h1>
    <div id="result" class="day">計算中…</div>
    <div id="today" class="small"></div>
    <div id="jpTime" class="small"></div>
    <div id="vnTime" class="small"></div>

  </div>

 <script>
  // ✅ 開始日（Safariでも安全な書き方）
  // 月は0始まり → 3月 = 2
  const start = new Date(2026, 2, 3);

  function toUtcDateOnly(d) {
    return Date.UTC(d.getFullYear(), d.getMonth(), d.getDate());
  }

  function updateAll() {
    const now = new Date();

    // --- 何日目 ---
    const diffDays =
      Math.floor(
        (toUtcDateOnly(now) - toUtcDateOnly(start)) /
        (1000 * 60 * 60 * 24)
      ) + 1;

    document.getElementById("result").textContent =
      ` ${diffDays} 日目！`;

    document.getElementById("today").textContent =
      `今日：${now.toLocaleDateString("ja-JP")}`;

    // --- 日本時間（秒まで）---
    const jpTime = now.toLocaleString("ja-JP", {
      timeZone: "Asia/Tokyo",
      year: "numeric",
      month: "2-digit",
      day: "2-digit",
      hour: "2-digit",
      minute: "2-digit",
      second: "2-digit"
    });

    // --- ベトナム時間（秒まで）---
    const vnTime = now.toLocaleString("ja-JP", {
      timeZone: "Asia/Ho_Chi_Minh",
      year: "numeric",
      month: "2-digit",
      day: "2-digit",
      hour: "2-digit",
      minute: "2-digit",
      second: "2-digit"
    });

    document.getElementById("jpTime").textContent = `日本時間：${jpTime}`;
    document.getElementById("vnTime").textContent = `ベトナム時間：${vnTime}`;
  }

  // 初回表示
  updateAll();
  // 1秒ごと更新（秒表示のため）
  setInterval(updateAll, 1000);
</script>
</body>
</html>
