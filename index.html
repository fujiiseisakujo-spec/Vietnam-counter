<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ベトナム生活カウンター</title>
  <style>
    body { font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Noto Sans JP", sans-serif; 
           display: grid; place-items: center; min-height: 100vh; margin: 0; }
    .card { padding: 24px 20px; border: 1px solid #ddd; border-radius: 14px; max-width: 520px; width: calc(100% - 24px); }
    h1 { margin: 0 0 8px; font-size: 26px; }
    p { margin: 8px 0 0; color: #555; }
    .big { font-size: 34px; font-weight: 800; letter-spacing: 0.5px; margin-top: 10px; }
    .small { font-size: 13px; color: #777; margin-top: 12px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>ベトナム生活</h1>
    <div id="counter" class="big">計算中…</div>
    <p id="today"></p>
    <p class="small">※開始日を変えたい場合は、HTML内の START_DATE を編集</p>
  </div>

  <script>
    // ====== ここだけ設定（開始日） ======
    // 例: 2026-03-01 に住み始めたなら "2026-03-01"
    const START_DATE = "2026-03-01";

    // 「何日目」なので 1日目 = 開始日当日
    // ずれを減らすため「日付をUTCの0時で揃えて暦日差」で計算する
    function toUtcDateOnly(date) {
      return Date.UTC(date.getFullYear(), date.getMonth(), date.getDate());
    }

    function calcDayNumber(startDateStr) {
      const start = new Date(startDateStr);
      const now = new Date();

      const startUtc = toUtcDateOnly(start);
      const nowUtc = toUtcDateOnly(now);

      const diffDays = Math.floor((nowUtc - startUtc) / (1000 * 60 * 60 * 24));
      return diffDays + 1; // 1日目スタート
    }

    const dayNumber = calcDayNumber(START_DATE);

    document.getElementById("counter").textContent = `○○日目！`.replace("○○", dayNumber);
    document.getElementById("today").textContent = `今日：${new Date().toLocaleDateString("ja-JP")}`;
  </script>
</body>
</html>
