<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ベトナム生活カウンター</title>
  <style>
    body {
      font-family: system-ui, -apple-system, "Segoe UI", "Noto Sans JP", sans-serif;
      display: grid;
      place-items: center;
      min-height: 100vh;
      margin: 0;
      background: #f7f7f7;
    }
    .card {
      background: #fff;
      padding: 24px 20px;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(0,0,0,.08);
      text-align: center;
      width: min(90%, 420px);
    }
    h1 { margin: 0 0 12px; }
    .day {
      font-size: 36px;
      font-weight: 800;
      margin: 12px 0;
    }
    .small {
      font-size: 13px;
      color: #666;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>🇻🇳 ベトナム生活</h1>
    <div id="result" class="day">計算中…</div>
    <div id="today" class="small"></div>
  </div>

  <script>
    // ✅ 開始日（固定）
    const START_DATE = "2026-03-03";

    // 日付だけで計算（タイムゾーンずれ防止）
    function toUtcDateOnly(d) {
      return Date.UTC(d.getFullYear(), d.getMonth(), d.getDate());
    }

    const start = new Date(START_DATE);
    const now = new Date();

    const diffDays =
      Math.floor(
        (toUtcDateOnly(now) - toUtcDateOnly(start)) /
        (1000 * 60 * 60 * 24)
      ) + 1; // 1日目スタート

    document.getElementById("result").textContent =
      `ベトナム生活 ${diffDays} 日目！`;

    document.getElementById("today").textContent =
      `今日：${now.toLocaleDateString("ja-JP")}`;
